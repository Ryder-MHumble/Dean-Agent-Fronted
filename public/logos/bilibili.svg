<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#00AEEC"/>
  <!-- Bilibili TV head with ears -->
  <!-- Left ear/antenna -->
  <rect x="28" y="12" width="8" height="18" rx="4" fill="white" transform="rotate(-15 32 21)"/>
  <!-- Right ear/antenna -->
  <rect x="64" y="12" width="8" height="18" rx="4" fill="white" transform="rotate(15 68 21)"/>
  <!-- TV body -->
  <rect x="18" y="28" width="64" height="48" rx="12" fill="white"/>
  <!-- Eyes -->
  <circle cx="38" cy="48" r="7" fill="#00AEEC"/>
  <circle cx="62" cy="48" r="7" fill="#00AEEC"/>
  <circle cx="40" cy="46" r="2.5" fill="white"/>
  <circle cx="64" cy="46" r="2.5" fill="white"/>
  <!-- Smile -->
  <path d="M35 62 Q50 72 65 62" stroke="#00AEEC" stroke-width="3.5" fill="none" stroke-linecap="round"/>
</svg>
