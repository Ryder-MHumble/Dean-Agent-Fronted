<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#E6162D"/>
  <!-- Weibo cloud/chat bubble shape with face -->
  <!-- Main white cloud body -->
  <ellipse cx="50" cy="56" rx="30" ry="24" fill="white"/>
  <!-- Smaller ellipse for top of cloud -->
  <ellipse cx="40" cy="42" rx="18" ry="14" fill="white"/>
  <!-- Eyes on the face in cloud -->
  <circle cx="43" cy="54" r="4.5" fill="#E6162D"/>
  <circle cx="57" cy="54" r="4.5" fill="#E6162D"/>
  <circle cx="44.5" cy="52.5" r="1.5" fill="white"/>
  <circle cx="58.5" cy="52.5" r="1.5" fill="white"/>
  <!-- Smile -->
  <path d="M40 64 Q50 71 60 64" stroke="#E6162D" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Weibo orange circle/dot top right (their brand element) -->
  <circle cx="68" cy="24" r="12" fill="#FF8200"/>
  <text x="68" y="29" font-family="Arial" font-size="14" font-weight="900" fill="white" text-anchor="middle">微</text>
</svg>
